<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coding Garden 🌱</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="garden-card">
    <p class="eyebrow">🌤️ One commit at a time</p>

    <h1>Coding Garden</h1>

    <p class="message">
      Every small step helps this little garden grow.
    </p>

    <div class="plant" id="plant">🌱</div>

    <p class="level-text" id="levelText">Level 1 — Tiny Seedling</p>

    <button id="waterButton">
      Water me 💧
    </button>

    <p class="counter">
      Watered <span id="waterCount">0</span> times
    </p>
  </main>

  <script src="script.js"></script>
</body>
</html>
